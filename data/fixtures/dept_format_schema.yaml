labs:
  - id: LAB-01
    title: "Wireshark Traffic Analysis"
    prerequisites: ["None"]
    automated_test_cases:
      - "test_pcap_contains_http_get"
      - "test_identify_telnet_creds"
      - "test_filter_icmp_unreachable"
      - "test_extract_ftp_payload"
      - "test_calculate_tcp_latency"
  - id: LAB-02
    title: "ARP Spoofing & MITM"
    prerequisites: ["LAB-01"]
    automated_test_cases:
      - "test_arp_cache_poisoned"
      - "test_ip_forwarding_enabled"
      - "test_packet_interception_verified"
      - "test_dns_record_spoof"
      - "test_sslstrip_execution"
  - id: LAB-03
    title: "OpenSSL & Certificate Chains"
    prerequisites: ["None"]
    automated_test_cases:
      - "test_rsa_key_generation"
      - "test_csr_signature_valid"
      - "test_ca_root_trust_store"
      - "test_cert_chain_validation"
      - "test_crl_revocation_check"
  - id: LAB-04
    title: "Iptables & Snort Configuration"
    prerequisites: ["LAB-02"]
    automated_test_cases:
      - "test_block_inbound_port_22"
      - "test_rate_limit_icmp"
      - "test_snort_alert_on_nmap"
      - "test_nat_rule_persistence"
      - "test_log_dropped_packets"
  - id: LAB-05
    title: "TLS Handshake Analysis"
    prerequisites: ["LAB-03"]
    automated_test_cases:
      - "test_extract_server_hello"
      - "test_verify_cipher_suite"
      - "test_analyze_diffie_hellman"
      - "test_sni_field_detection"
      - "test_tls_1_3_downgrade_prevention"
  - id: LAB-06
    title: "WPA2-PSK Cracking (Aircrack-ng)"
    prerequisites: ["LAB-01"]
    automated_test_cases:
      - "test_capture_4way_handshake"
      - "test_monitor_mode_enabled"
      - "test_deauth_attack_success"
      - "test_wordlist_hit_verification"
      - "test_bssid_filtering"
  - id: LAB-07
    title: "BGP Prefix Hijacking Simulation"
    prerequisites: ["None"]
    automated_test_cases:
      - "test_bgp_neighbor_established"
      - "test_as_path_prepending"
      - "test_detect_rogue_prefix"
      - "test_rpki_valid_filtering"
      - "test_route_map_application"
  - id: LAB-08
    title: "Network Forensics & Log Correlation"
    prerequisites: ["LAB-01", "LAB-04"]
    automated_test_cases:
      - "test_correlate_syslog_pcap"
      - "test_reconstruct_exfiltrated_file"
      - "test_identify_c2_beacon_pattern"
      - "test_timeline_generation"
      - "test_hash_integrity_verification"

assessments:
  - type: "Bi-Weekly Quizzes"
    weight: 20
    rubric:
      - target: "LO-SEC-01, LO-SEC-03, LO-SEC-06, LO-SEC-11"
        criteria: "Conceptual accuracy in cryptographic theory and protocol mechanics."
  - type: "Lab Completions"
    weight: 40
    rubric:
      - target: "LO-SEC-02, LO-SEC-04, LO-SEC-07, LO-SEC-09"
        criteria: "Passing 5/5 automated test cases per lab."
  - type: "Midterm Project: Secure Network Design"
    weight: 15
    rubric:
      - target: "LO-SEC-05, LO-SEC-08"
        criteria: "Implementation of Zero Trust principles and TLS load balancing."
  - type: "Final Exam"
    weight: 25
    rubric:
      - target: "LO-SEC-10, LO-SEC-12, All previous"
        criteria: "Comprehensive synthesis of defensive strategy and ethical incident response."

grading_weights:
  quizzes: 20
  labs: 40
  midterm_project: 15
  final_exam: 25
