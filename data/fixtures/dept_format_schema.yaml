title: "CS 4501: Network Security (8-week Accelerated)"
outcomes_mapped:
  - id: LO-SEC-01
    description: "Analyze and implement cryptographic protocols for secure communication."
  - id: LO-SEC-02
    description: "Evaluate network perimeter defense mechanisms including firewalls and IDS."
  - id: LO-SEC-03
    description: "Identify and mitigate common network-layer attacks (MITM, DoS, Spoofing)."
  - id: LO-SEC-04
    description: "Demonstrate proficiency in packet analysis and traffic forensics."
  - id: LO-SEC-05
    description: "Apply principles of least privilege and zero-trust architecture in network design."
  - id: LO-SEC-06
    description: "Assess wireless and mobile network security vulnerabilities."
  - id: LO-SEC-07
    description: "Implement secure remote access solutions (VPNs, SSH)."
  - id: LO-SEC-08
    description: "Design and verify application-layer security (TLS/HTTPS)."
  - id: LO-SEC-09
    description: "Execute structured vulnerability scanning and penetration testing workflows."
  - id: LO-SEC-10
    description: "Understand legal and ethical frameworks for network monitoring."
  - id: LO-SEC-11
    description: "Configure and secure routing protocols (BGPsec, OSPF Auth)."
  - id: LO-SEC-12
    description: "Develop incident response plans for network-based breaches."

week_plan:
  - week: 1
    topic: "Foundations & Packet Analysis"
    outcomes: ["LO-SEC-04", "LO-SEC-10"]
    justification: "Establishes baseline visibility and ethical constraints before active exploitation modules, aligning with ACM CyberEd Data Security knowledge area."
  - week: 2
    topic: "Network Layer Attacks & Defense"
    outcomes: ["LO-SEC-03", "LO-SEC-05"]
    justification: "Focuses on L2/L3 vulnerabilities; maps to ACM Component 3: Connection Security."
  - week: 3
    topic: "Applied Cryptography & PKI"
    outcomes: ["LO-SEC-01", "LO-SEC-08"]
    justification: "Transitions from cleartext to encrypted traffic; addresses IEEE outcomes for Cryptographic primitives in network protocols."
  - week: 4
    topic: "Perimeter Defense & Firewalls"
    outcomes: ["LO-SEC-02", "LO-SEC-09"]
    justification: "Covers stateful inspection and NIDS; maps to ACM System Security and defensive operations."
  - week: 5
    topic: "Transport Layer Security (TLS)"
    outcomes: ["LO-SEC-01", "LO-SEC-07"]
    justification: "Deep dive into handshake protocols and secure tunneling; required for IEEE 'Secure Communications' competency."
  - week: 6
    topic: "Wireless & IoT Security"
    outcomes: ["LO-SEC-06", "LO-SEC-03"]
    justification: "Explores 802.11i and WPA3; addresses emerging threats in mobile environments per ACM recommendations."
  - week: 7
    topic: "Enterprise Architecture & Zero Trust"
    outcomes: ["LO-SEC-05", "LO-SEC-11"]
    justification: "Synthesis of segmentation and secure routing; aligns with modern industry shift toward ZTA."
  - week: 8
    topic: "Incident Response & Forensics"
    outcomes: ["LO-SEC-12", "LO-SEC-04"]
    justification: "Capstone week focusing on post-compromise recovery and evidence preservation."

