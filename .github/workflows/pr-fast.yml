name: PR Fast Feedback

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fast feedback
        run: ./scripts/fast-feedback.sh
